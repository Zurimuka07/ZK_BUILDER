name: SUPER SIZE
permissions:
  contents: write
on:
  workflow_dispatch:
    inputs:
      URLS:
        description: "FASTBOOT ROM URL"
        required: true
        type: string
jobs:
  get_super_size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y aria2 android-sdk-libsparse-utils jq tar unzip > /dev/null 2>&1
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd "$GITHUB_WORKSPACE"
          super_json="super_size.json"
          
          echo "Downloading super_size.json using gh cli..."
          # Download securely via GitHub CLI (works for private repos too)
          gh release download super-size -p "super_size.json" --clobber 2>/dev/null || echo "{}" > "$super_json"
          
          echo "--- Current JSON content ---"
          cat "$super_json"
          echo "----------------------------"
          
          IFS=';' read -ra URL_ARRAY <<< "${{ github.event.inputs.URLS }}"
          for url in "${URL_ARRAY[@]}"; do
            url=$(echo "$url" | xargs)
            if [ -z "$url" ]; then continue; fi
            
            filename=$(basename "${url%%\?*}")
            echo "======================================"
            echo "Processing link: $filename"
            
            # Extract the very first word before '_' (Standard Xiaomi fastboot rom format)
            DEVICE_RAW=$(echo "$filename" | awk -F'_' '{print $1}')
            
            if [ -z "$DEVICE_RAW" ]; then
              echo "Cannot detect device from $filename. Skipping."
              continue
            fi
            
            DEVICE_LOWER="${DEVICE_RAW,,}"
            DEVICE_UPPER="${DEVICE_RAW^^}"
            echo "Device detected: LOWER=$DEVICE_LOWER | UPPER=$DEVICE_UPPER"
            
            # Explicitly check json to avoid silent exit code failures
            CHECK=$(jq --arg ml "$DEVICE_LOWER" --arg mu "$DEVICE_UPPER" 'if has($ml) or has($mu) then "yes" else "no" end' "$super_json" 2>/dev/null | tr -d '"')
            
            if [ "$CHECK" = "yes" ]; then
              echo "✅ Model $DEVICE_LOWER already exists in JSON. SKIPPING DOWNLOAD."
              continue
            fi
            
            echo "⬇️ Model $DEVICE_LOWER not found in JSON. Downloading ROM..."
            ext="${filename##*.}"
            tmp_rom="FASTBOOT.$ext"
            aria2c -s16 -x16 -j$(nproc) -c -U "Mozilla/5.0" -o "$tmp_rom" "$url" || { echo "Download failed"; rm -f "$tmp_rom"; continue; }
            
            echo "Extracting super.img..."
            mkdir -p FASTBOOT_EXTRACT
            if [[ "$ext" == "tgz" || "$ext" == "tar.gz" ]]; then
              tar -xzf "$tmp_rom" -C "FASTBOOT_EXTRACT" --wildcards "*/images/super.img*" 2>/dev/null || tar -xzf "$tmp_rom" -C "FASTBOOT_EXTRACT"
            elif [[ "$ext" == "zip" ]]; then
              unzip -q -j "$tmp_rom" "*/images/super.img" -d "FASTBOOT_EXTRACT" 2>/dev/null || unzip -q "$tmp_rom" -d "FASTBOOT_EXTRACT"
            else
              echo "Unsupported format: $ext"
              rm -rf "$tmp_rom" FASTBOOT_EXTRACT
              continue
            fi
            
            SUPER_IMG=$(find FASTBOOT_EXTRACT -name "super.img" | head -n 1)
            if [ -z "$SUPER_IMG" ]; then
              echo "super.img not found in this ROM."
              rm -rf "$tmp_rom" FASTBOOT_EXTRACT
              continue
            fi
            
            echo "Converting and calculating size..."
            simg2img "$SUPER_IMG" "raw_super.img" 2>/dev/null || cp "$SUPER_IMG" "raw_super.img"
            super_size=$(stat -c %s "raw_super.img")
            echo "Size of super.img for $DEVICE_LOWER: $super_size bytes"
            
            # Add to json
            jq --arg m "$DEVICE_LOWER" --argjson s "$super_size" '. + {($m): {super_size: $s}}' "$super_json" > tmp.json && mv tmp.json "$super_json"
            
            # Clean up disk
            rm -rf "$tmp_rom" FASTBOOT_EXTRACT "raw_super.img"
          done
          
          echo "======================================"
          echo "Final super_size.json to upload:"
          cat "$super_json"
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload super-size super_size.json --clobber
          echo "Uploaded super_size.json to GitHub Release."
