name: ZK BUILDER STOCK
on:
  workflow_dispatch:
    inputs:
      URL:
        description: "OTA PACKAGE URL FOR BUILD"
        required: true
      SFU:
        description: "SOURCEFORGE UPLOADER"
        type: boolean
        default: 'true'
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ROM_URL: ${{ github.event.inputs.URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check free disk space
        id: diskcheck
        run: |
          FREE_GB=$(df -BG / | awk 'NR==2 {gsub("G","",$4); print $4}')
          echo "Free disk space: ${FREE_GB}GB"
          echo "need_cleanup=$( [ "$FREE_GB" -lt 50 ] && echo true || echo false )" >> $GITHUB_OUTPUT
      - name: Maximize build disk space
        if: steps.diskcheck.outputs.need_cleanup == 'true'
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-cached-tools: 'true'
      - name: Setup build environment
        run: |
          sudo timedatectl set-timezone UTC
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            android-sdk-libsparse-utils aria2 device-tree-compiler erofs-utils \
            g++ gcc git lz4 \
            openjdk-17-jdk openjdk-17-jdk-headless \
            openssh-client p7zip-full \
            python-is-python3 python3 python3-pip \
            xz-utils zip zipalign zlib1g-dev > /dev/null 2>&1
          sudo pip install --quiet protobuf \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth-oauthlib > /dev/null 2>&1
          DATE=$(TZ=UTC date +"%y%m%d")
          ROM_NAME="$(basename "${ROM_URL%%\?*}")"
          DEVICE=""
          ROM_VER=""
          ZK_NAME=""
          IS_PRIVATE_DEVICE="false"
          if [[ "$ROM_NAME" == *"-OS"* ]]; then
            if [[ "$ROM_NAME" =~ ^([a-z0-9]+)-ota_full-(OS[0-9.]+)\.([A-Z0-9]+)-user-([0-9.]+)-.*\.zip$ ]]; then
              DEVICE="${BASH_REMATCH[1]^^}"
              OS_VER="${BASH_REMATCH[2]}"
              REGION="${BASH_REMATCH[3]}"
              ROM_VER="${OS_VER%%.*}"
              ZK_NAME="ZKOS_${DEVICE}_${OS_VER}.${REGION}_CN${DATE}"
            elif [[ "$ROM_NAME" =~ ^([a-z0-9]+)_[a-z_]+-ota_full-(OS[0-9.]+)\.([A-Z0-9]+)-user-([0-9.]+)-.*\.zip$ ]]; then
              DEVICE="${BASH_REMATCH[1]^^}"
              OS_VER="${BASH_REMATCH[2]}"
              REGION="${BASH_REMATCH[3]}"
              ROM_VER="${OS_VER%%.*}"
              ZK_NAME="ZKOS_${DEVICE}_${OS_VER}.${REGION}_MI${DATE}"
            else
              echo "::warning::Regex did not match, using fallback name"
              ZK_NAME="ZKOS_${DATE}"
            fi
          else
            echo "::error::Unable to parse ROM name: $ROM_NAME"
            exit 1
          fi
          case "${DEVICE,,}" in
            nezha|pandora|pudding|popsicle|myron|byron)
              IS_PRIVATE_DEVICE="true" ;;
          esac
          {
            echo "ZK_NAME=$ZK_NAME"
            echo "DEVICE=${DEVICE,,}"
            echo "ROM_VER=$ROM_VER"
            echo "IS_PRIVATE_DEVICE=$IS_PRIVATE_DEVICE"
          } >> $GITHUB_ENV
          echo "ZK_NAME=$ZK_NAME | DEVICE=${DEVICE,,} | ROM_VER=$ROM_VER | private=$IS_PRIVATE_DEVICE"
      - name: Download ROM files
        run: |
          DEST_DIR="$GITHUB_WORKSPACE/ROM"
          echo "::group::Downloading OTA ROM"
          mkdir -p "$DEST_DIR"
          timeout 9000 aria2c \
            -s16 -x16 -j"$(nproc)" -c \
            -U "Mozilla/5.0" \
            --console-log-level=warn \
            -d "$DEST_DIR" \
            -o "${ZK_NAME}.zip" \
            "$ROM_URL" \
            || { echo "::error::OTA ROM download failed"; exit 1; }
          echo "::endgroup::"
          [ -s "$DEST_DIR/${ZK_NAME}.zip" ] \
            || { echo "::error::Downloaded ROM is missing or empty"; exit 1; }
          echo "Download complete: $(du -h "$DEST_DIR/${ZK_NAME}.zip" | cut -f1)"
      - name: Clone ZK AUTO BUILD sources
        run: |
          ZK_HOME="/home/runner/work/ZK_AUTO_BUILD/ZK_AUTO_BUILD"
          echo "ZK_HOME=$ZK_HOME" >> $GITHUB_ENV
          install -d -m 700 ~/.ssh
          echo "${{ secrets.PRIVATE_REPO_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          git clone -b stock --depth=1 git@github.com:zuri1503/ZK_AUTO_BUILD.git "$ZK_HOME"
          mkdir -p "$ZK_HOME/ROM"
          mv -f "$GITHUB_WORKSPACE/ROM/${ZK_NAME}.zip" "$ZK_HOME/ROM/${ZK_NAME}.zip"
          sudo chmod -R +x "$ZK_HOME"
      - name: Build ProjectZK ROM
        run: |
          sudo bash "$ZK_HOME/build.sh" "$GITHUB_ENV" "$ZK_NAME"
      - name: Upload ROM to Clouds
        run: |
          cd "$ZK_HOME/tools"
          echo "${{ secrets.TOKEN_PICKLE2 }}" | base64 -d > token.pickle
          echo "${{ secrets.UPLOADER }}" | base64 -d > upload.py
          echo "${{ secrets.SF_SSH_KEY }}" > key
          chmod 0600 key token.pickle upload.py
          sf_upload() {
            local src="$1" dest_path="$2"
            [ "${{ github.event.inputs.SFU }}" = "true" ] || return 0
            rsync -a --partial -q \
              -e "ssh -i key -o StrictHostKeyChecking=no" \
              "$src" \
              "zuri1503@frs.sourceforge.net:/home/frs/project/projectzk/ProjectZK/${dest_path}/" \
              || { echo "::error::rsync failed → $dest_path"; exit 1; }
            echo "Uploaded $(basename "$src") → SF:$dest_path"
          }
          gd_upload() {
            local folder_id="$1"
            python upload.py --folder-id "$folder_id" "$ROM_OUTPUT" > /dev/null 2>&1 \
              || { echo "::error::GDrive upload failed (folder: $folder_id)"; exit 1; }
          }
          pd_upload() {
            local file="$1"
            curl -u ":${{ secrets.PIXELDRAIN_API }}" -X PUT -T "$file" "https://pixeldrain.com/api/file/${ZK_NAME}.zip"
          }
          if [ -f "$ZK_HOME/is_global" ]; then
            SF_PATH="ZK-MI"
            GD_FOLDER="1-xoy6G1nutYrKzT4Lc0dGsmEQUJRhJFN"
          else
            SF_PATH="ZK-CN"
            GD_FOLDER="1PosY7KpdfuAquJjGDMpYSgYUNNKNLTyf"
          fi
          if [ "$IS_PRIVATE_DEVICE" = "true" ]; then
            gd_upload "${{ secrets.PRIVATE_DRIVE_ID }}"
          else
            sf_upload "$ROM_OUTPUT" "$SF_PATH"
            gd_upload "$GD_FOLDER"
            echo "ZK_LINK=https://index.projectzk.online/0:/${SF_PATH}" >> $GITHUB_ENV
          fi
          pd_upload "$ROM_OUTPUT"
          rm -f key token.pickle upload.py
      - name: Telegram Notification
        if: env.IS_PRIVATE_DEVICE != 'true' && env.ZK_LINK != ''
        run: |
          PAYLOAD=$(jq -n \
            --arg chat "-1002030539146" \
            --arg text "✅ <b>NEW BUILD: <a href='${ZK_LINK}/${ZK_NAME}.zip'>${ZK_NAME}.zip</a></b>" \
            '{ chat_id: $chat, text: $text, parse_mode: "HTML" }')
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
